name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-plugin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Get version from tag
        id: tag_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version match: $TAG_VERSION"

      - name: Verify versions.json contains this version
        run: |
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          node -e "
            const versions = require('./versions.json');
            if (!versions['$TAG_VERSION']) {
              console.error('Error: versions.json does not contain version $TAG_VERSION');
              process.exit(1);
            }
            console.log('✓ versions.json contains $TAG_VERSION');
          "

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            main.js
            manifest.json
            styles.css
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-plugin

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-preview') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
